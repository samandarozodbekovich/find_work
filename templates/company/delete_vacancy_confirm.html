{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4 p-5 text-center">
                <span class="badge bg-danger bg-opacity-10 text-danger mb-3">Xavfli amal</span>
                <h3 class="fw-bold mb-3">Vakansiyani o'chirish</h3>
                <p class="text-muted mb-4">Haqiqatan ham <strong>"{{ vacancy.title }}"</strong> vakansiyasini o'chirib tashlamoqchimisiz?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-danger btn-lg fw-bold">Ha, o'chirilsin</button>
                        <a href="{% url 'profile' user_pk %}" class="btn btn-outline-secondary btn-lg">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
