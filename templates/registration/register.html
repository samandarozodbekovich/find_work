{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 p-4 shadow-sm rounded" style="background-color: var(--card-bg);">
            <h2 class="text-center mb-4" style="color: var(--text-color);">Ro'yxatdan o'tish</h2>
            <form method="post" class="register-form">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--text-color);">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 mt-3">Tasdiqlash</button>
            </form>
        </div>
    </div>
</div>

<style>
    /* Ro'yxatdan o'tish formasi inputlarini tungi rejimga moslash */
    [data-theme='dark'] .register-form input,
    [data-theme='dark'] .register-form select,
    [data-theme='dark'] .register-form textarea {
        background-color: #2d2d2d !important;
        border-color: #444 !important;
        color: #fff !important;
    }
    [data-theme='dark'] .register-form input:focus {
        border-color: var(--primary-color) !important;
    }
</style>
{% endblock %}
