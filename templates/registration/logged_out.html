{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">

                    <i class="fas fa-sign-out-alt fa-4x text-primary"></i>
                </div>
                
                <h2 class="fw-bold text-dark">Tizimdan chiqdingiz</h2>

                <div class="d-grid gap-2">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg shadow-sm">Qayta kirish</a>

    </div>
