{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 p-4" style="background-color: var(--card-bg);">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Yangi parol o'rnatish</h2>
                    <p style="color: var(--text-color); opacity: 0.8;" class="small">Iltimos, yangi va esda qoladigan parolni kiriting.</p>
                </div>

                <form method="post" class="password-form">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-medium" style="color: var(--text-color);">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 fw-bold">Parolni saqlash</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Parol formasi inputlarini tungi rejimga moslash */
    [data-theme='dark'] .password-form input {
        background-color: #2d2d2d !important;
        border-color: #444 !important;
        color: #fff !important;
    }
    [data-theme='dark'] .password-form input:focus {
        border-color: var(--primary-color) !important;
    }
</style>
{% endblock %}
