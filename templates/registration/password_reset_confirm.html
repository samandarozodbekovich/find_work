{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card mx-auto">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Yangi parol o'rnatish</h2>
                    <p class="text-muted small">Iltimos, yangi va esda qoladigan parolni kiriting.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 fw-bold">Parolni saqlash</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
