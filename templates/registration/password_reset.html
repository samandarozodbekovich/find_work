{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Parolni tiklash</h2>
                    <p class="text-muted small">Emailingizni kiriting, biz sizga parolni yangilash bo'yicha yo'riqnoma yuboramiz.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-medium">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 fw-bold">Yuborish</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none small">Orqaga qaytish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
