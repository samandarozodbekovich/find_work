{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm p-4 border-0 rounded-4" style="background-color: var(--card-bg);">
                <h4 class="mb-4" style="color: var(--text-color);">Parolni o'zgartirish</h4>
                <form method="post" class="password-form">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" style="color: var(--text-color);">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Parolni saqlash</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Parol formasi inputlari uchun tungi rejim sozlamasi */
    [data-theme='dark'] .password-form input {
        background-color: #2d2d2d !important;
        border-color: #444 !important;
        color: #fff !important;
    }
    [data-theme='dark'] .password-form input:focus {
        border-color: var(--primary-color) !important;
    }
</style>
{% endblock %}
