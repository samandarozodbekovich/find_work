{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 p-4 text-center" style="background-color: var(--card-bg);">
                <div class="mb-4">
                    <div class="display-1 text-success mb-3">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h2 class="fw-bold" style="color: var(--text-color);">Xat yuborildi!</h2>
                    <p style="color: var(--text-color); opacity: 0.8; margin-top: 1rem;">
                        Parolingizni tiklash bo'yicha ko'rsatmalarni emailingizga yubordik. 
                        Iltimos, pochtangizni (spam qismini ham) tekshiring.
                    </p>
                </div>

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary w-100 btn-lg fw-bold">Kirish sahifasiga qaytish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
