{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card mx-auto text-center p-4">
                <div class="mb-4">
                    <div class="display-1 text-success mb-3">
                        <i class="fas fa-lock-open"></i>
                    </div>
                    <h2 class="fw-bold">Parol tiklandi!</h2>
                    <p class="text-muted mt-3">
                        Sizning parolingiz muvaffaqiyatli o'zgartirildi. Endi yangi parolingiz bilan tizimga kirishingiz mumkin.
                    </p>
                </div>

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary w-100 btn-lg fw-bold">Tizimga kirish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
