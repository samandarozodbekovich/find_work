{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold">{{ title }}</h4>
            <a href="{% url 'post_list' %}" class="text-muted small">Orqaga</a>
          </div>

          <form method="post" enctype="multipart/form-data" class="row g-3">
            {% csrf_token %}

            <div class="col-12">
              <label class="form-label">Sarlavha</label>
              {{ form.title }}
            </div>

            <div class="col-12">
              <label class="form-label">Matn</label>
              {{ form.description }}
            </div>

            <div class="col-md-6">
              <label class="form-label">Rasm (ixtiyoriy)</label>
              {{ form.image }}
            </div>

            <div class="col-md-6 d-flex align-items-end justify-content-end">
              <div class="form-check me-3">
                {{ form.is_published }} <label class="form-check-label">Nashr etilsin</label>
              </div>
            </div>

            <div class="col-12 d-flex gap-2 justify-content-end mt-3">
              <a href="{% url 'profile' user.pk %}" class="btn btn-outline-secondary">Bekor qilish</a>
              <button type="submit" name="add_another" class="btn btn-outline-primary">Saqlash va yana</button>
              <button type="submit" class="btn btn-primary">Saqlash</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
