{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-body p-4 text-center">
                    <h4 class="mb-4 fw-bold">Haqiqatan ham o'chirmoqchimisiz?</h4>
                    <p class="text-muted mb-4">Ushbu amalni qaytarib bo'lmaydi. Iltimos, ishonchingiz komil ekanligiga ishonch hosil qiling.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                            <button type="submit" class="btn btn-danger flex-fill">Ha, o'chirish</button>
                            <a href="{% url 'profile' user.pk %}" class="btn btn-outline-secondary flex-fill">Bekor qilish</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
